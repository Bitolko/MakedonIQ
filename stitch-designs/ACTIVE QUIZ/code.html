<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MakedonIQ - Active Quiz</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;900&amp;family=Quicksand:wght@400;500;700&amp;family=Inter:wght@600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;family=Montserrat:wght@100..900&amp;family=Quicksand:wght@100..900&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .filled-icon {
            font-variation-settings: 'FILL' 1;
        }
        .btn-3d-primary {
            box-shadow: 0 4px 0 0 #7a0000;
        }
        .btn-3d-primary:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 0 #7a0000;
        }
        .option-card-selected {
            border-bottom: 4px solid #705d00;
        }
        .option-card-correct {
            border-bottom: 4px solid #1a1a2e;
            background-color: #f2f1ec;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.3s ease-out forwards;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#936e69",
                        "inverse-primary": "#ffb4a8",
                        "surface-container-highest": "#e3e3de",
                        "on-secondary-fixed": "#221b00",
                        "surface-bright": "#faf9f4",
                        "on-tertiary-fixed": "#1a1a2e",
                        "on-secondary-container": "#6e5c00",
                        "outline-variant": "#e8bcb5",
                        "surface-dim": "#dbdad5",
                        "background": "#faf9f4",
                        "error": "#ba1a1a",
                        "surface": "#faf9f4",
                        "on-surface-variant": "#5e3f3a",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#e7e4ff",
                        "secondary": "#705d00",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#c00000",
                        "on-primary-fixed": "#410000",
                        "secondary-container": "#fcd400",
                        "tertiary-fixed": "#e2e0fc",
                        "inverse-surface": "#30312e",
                        "on-primary-fixed-variant": "#930000",
                        "on-background": "#1b1c19",
                        "on-surface": "#1b1c19",
                        "tertiary-fixed-dim": "#c6c4df",
                        "primary-container": "#d20000",
                        "on-error": "#ffffff",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#f2f1ec",
                        "surface-container": "#efeee9",
                        "surface-container-high": "#e9e8e3",
                        "tertiary": "#4e4d64",
                        "primary-fixed-dim": "#ffb4a8",
                        "on-primary": "#ffffff",
                        "primary-fixed": "#ffdad4",
                        "surface-variant": "#e3e3de",
                        "tertiary-container": "#66657d",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#f5f4ef",
                        "secondary-fixed-dim": "#e9c400",
                        "on-secondary-fixed-variant": "#544600",
                        "secondary-fixed": "#ffe16d",
                        "on-tertiary-fixed-variant": "#45455b",
                        "on-primary-container": "#ffe1dc",
                        "error-container": "#ffdad6",
                        "primary": "#a40000"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "margin-desktop": "48px",
                        "container-max": "1200px",
                        "unit": "8px",
                        "margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "display-lg-mobile": ["Montserrat"],
                        "body-md": ["Quicksand"],
                        "headline-md": ["Montserrat"],
                        "label-sm": ["Inter"],
                        "display-lg": ["Montserrat"],
                        "body-lg": ["Quicksand"]
                    },
                    "fontSize": {
                        "display-lg-mobile": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-surface font-body-md text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation Anchor -->
<header class="bg-surface shadow-sm sticky top-0 z-40">
<div class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-4 max-w-container-max mx-auto">
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-surface-container rounded-full transition-colors text-on-surface-variant">
<span class="material-symbols-outlined">close</span>
</button>
<div class="hidden md:block">
<h1 class="font-display-lg-mobile text-display-lg-mobile font-bold text-primary">MakedonIQ</h1>
</div>
</div>
<!-- Progress Bar Section -->
<div class="flex-1 max-w-xl mx-8 hidden sm:flex items-center gap-4">
<div class="relative w-full h-4 bg-surface-container-highest rounded-full overflow-hidden">
<div class="absolute top-0 left-0 h-full bg-primary-container transition-all duration-500 rounded-full" style="width: 30%"></div>
<div class="absolute right-0 top-1/2 -translate-y-1/2 pr-1">
<span class="material-symbols-outlined text-secondary text-sm filled-icon">auto_awesome</span>
</div>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant whitespace-nowrap">3 / 10</span>
</div>
<!-- Bilingual Toggle & Points -->
<div class="flex items-center gap-4">
<div class="flex bg-surface-container p-1 rounded-full border border-outline-variant">
<button class="px-3 py-1 rounded-full text-xs font-bold bg-white shadow-sm text-primary">EN</button>
<button class="px-3 py-1 rounded-full text-xs font-bold text-on-surface-variant hover:bg-surface-container-high">MK</button>
</div>
<div class="flex items-center gap-2 bg-secondary-container px-4 py-2 rounded-full">
<span class="material-symbols-outlined text-on-secondary-container filled-icon text-[20px]">monetization_on</span>
<span class="font-bold text-on-secondary-container">450</span>
</div>
</div>
</div>
<!-- Mobile Progress (visible only on small screens) -->
<div class="sm:hidden px-margin-mobile pb-4">
<div class="flex items-center gap-3">
<div class="relative flex-1 h-3 bg-surface-container-highest rounded-full overflow-hidden">
<div class="absolute top-0 left-0 h-full bg-primary-container" style="width: 30%"></div>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant">3/10</span>
</div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop py-8 max-w-container-max mx-auto w-full">
<div class="w-full max-w-3xl space-y-12">
<!-- Question Card -->
<div class="text-center space-y-6">
<div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-tertiary/10 text-tertiary">
<span class="material-symbols-outlined text-[18px]">translate</span>
<span class="font-label-sm text-label-sm uppercase tracking-wider">Vocabulary Quiz</span>
</div>
<h2 class="font-display-lg-mobile text-display-lg-mobile md:font-display-lg md:text-display-lg text-on-surface-variant">
                    What does <span class="text-primary italic font-black">"добро утро"</span> mean?
                </h2>
<div class="flex justify-center">
<div class="w-48 h-48 bg-surface-container-low rounded-lg p-4 flex items-center justify-center shadow-sm">
<img alt="Morning sunrise over lake" class="rounded-lg object-cover w-full h-full" data-alt="A serene cinematic shot of a golden sunrise over the calm waters of Lake Ohrid, with the traditional terracotta rooftops of the old town in the foreground. The lighting is soft and warm, capturing a peaceful morning atmosphere. The visual style is premium and high-definition, reflecting a modern educational travel aesthetic with warm heritage reds and golden yellows dominant in the palette." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDbKtcoMUMXv1bQQDQLpxd2alik0aimM9tiggT3z-5rRrVl2ibd116Efdre2mZ-hSRIK8eP3dvamMA1ZtkUnmY6D9YpwZxLKUgrWypfufMoSi7fryf2VtmAFCoJkojFSiXJAumcpu6hW3hS81Vu6wLV0EJDwjQYFLW6uDqs7yLpmWR1xoDf_kTWMtgo4k_RL61j8jm6RO4v7xYJXad77CMknQLcysBVB98udUlV9mZ3r0sjZ4Kf5uRRZcbGwg3Ci1SnjqRvx1PoHu4"/>
</div>
</div>
</div>
<!-- Options Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Option A -->
<button class="flex items-center p-6 bg-white border-2 border-outline-variant rounded-lg hover:border-secondary transition-all group active:scale-95">
<span class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-high text-on-surface-variant font-bold mr-4 group-hover:bg-secondary group-hover:text-white">A</span>
<span class="font-body-lg text-body-lg text-on-surface">Good night</span>
</button>
<!-- Option B (Correct State) -->
<button class="flex items-center p-6 bg-secondary-container border-2 border-secondary rounded-lg option-card-selected transition-all group relative">
<span class="w-10 h-10 flex items-center justify-center rounded-full bg-secondary text-white font-bold mr-4">B</span>
<span class="font-body-lg text-body-lg text-on-secondary-container font-bold">Good morning</span>
<div class="absolute -top-3 -right-3 bg-secondary text-white rounded-full p-1 shadow-md">
<span class="material-symbols-outlined filled-icon text-[20px]">check</span>
</div>
</button>
<!-- Option C -->
<button class="flex items-center p-6 bg-white border-2 border-outline-variant rounded-lg hover:border-secondary transition-all group active:scale-95">
<span class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-high text-on-surface-variant font-bold mr-4 group-hover:bg-secondary group-hover:text-white">C</span>
<span class="font-body-lg text-body-lg text-on-surface">Thank you</span>
</button>
<!-- Option D -->
<button class="flex items-center p-6 bg-white border-2 border-outline-variant rounded-lg hover:border-secondary transition-all group active:scale-95">
<span class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-high text-on-surface-variant font-bold mr-4 group-hover:bg-secondary group-hover:text-white">D</span>
<span class="font-body-lg text-body-lg text-on-surface">Goodbye</span>
</button>
</div>
</div>
</main>
<!-- Feedback Overlay (Slide up on success) -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-low border-t-4 border-secondary animate-slide-up shadow-2xl z-50" id="feedback-panel">
<div class="max-w-3xl mx-auto px-margin-mobile md:px-margin-desktop py-6 md:py-8 flex flex-col md:flex-row items-center justify-between gap-6">
<div class="flex items-center gap-4 text-secondary">
<div class="w-16 h-16 rounded-full bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-[40px] filled-icon">check_circle</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md font-bold">Excellent!</h3>
<p class="text-on-surface-variant">Correct meaning of the morning greeting.</p>
</div>
</div>
<div class="flex items-center gap-4 w-full md:w-auto">
<div class="flex flex-col items-center px-6 hidden sm:flex">
<span class="text-label-sm font-label-sm uppercase text-on-surface-variant">Points Earned</span>
<span class="text-headline-md font-headline-md font-bold text-secondary">+15</span>
</div>
<button class="flex-1 md:flex-none bg-primary text-on-primary px-12 py-4 rounded-lg font-bold btn-3d-primary text-lg transition-transform hover:opacity-90">
                    NEXT
                </button>
</div>
</div>
</div>
<!-- Footer Space for Scroll -->
<div class="h-32 md:h-40"></div>
<script>
        // Simple logic for toggle visual feedback
        const languageButtons = document.querySelectorAll('.bilingual-toggle button');
        languageButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                languageButtons.forEach(b => {
                    b.classList.remove('bg-white', 'shadow-sm', 'text-primary');
                    b.classList.add('text-on-surface-variant');
                });
                btn.classList.add('bg-white', 'shadow-sm', 'text-primary');
                btn.classList.remove('text-on-surface-variant');
            });
        });

        // Add 3D tactile sound/feel logic placeholder
        const buttons = document.querySelectorAll('.btn-3d-primary, .option-card-correct');
        buttons.forEach(button => {
            button.addEventListener('mousedown', () => {
                button.style.transform = "translateY(2px)";
            });
            button.addEventListener('mouseup', () => {
                button.style.transform = "translateY(0px)";
            });
        });
    </script>
</body></html>
